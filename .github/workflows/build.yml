name: Build Plugin

on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download SDK Base
      shell: powershell
      run: |
        # Нам нужны только базовые ресурсы SDK, проекты мы принесли с собой
        $ProgressPreference = 'SilentlyContinue'
        Invoke-WebRequest -Uri "https://developers.maxon.net/downloads/Cinema_4D_CPP_SDK_21_207.zip" -OutFile sdk.zip
        Expand-Archive -Path sdk.zip -DestinationPath C:\sdk_base -Force

    - name: Run Build Script
      shell: powershell
      run: |
        # Копируем папку resource из чистого SDK к нам (она нужна для компиляции)
        Copy-Item -Path "C:\sdk_base\Cinema_4D_CPP_SDK_21_207\resource" -Destination ".\resource" -Recurse -Force
        
        # Запускаем наш нормальный скрипт
        .\build.ps1

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: geometry_projection
        path: plugins/geometry_projection/project/geometry_projection.xdl64