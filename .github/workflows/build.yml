name: Build Cinema 4D R21 Plugin

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Cache SDK
      id: cache-sdk
      uses: actions/cache@v4
      with:
        path: C:\c4d_build\sdk_extracted
        key: c4d-sdk-r21-v6

    - name: Download SDK
      if: steps.cache-sdk.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        $ProgressPreference = 'SilentlyContinue'
        New-Item -ItemType Directory -Force -Path C:\c4d_build | Out-Null
        Invoke-WebRequest -Uri "https://developers.maxon.net/downloads/Cinema_4D_CPP_SDK_21_207.zip" -OutFile C:\c4d_build\sdk.zip
        Expand-Archive -Path C:\c4d_build\sdk.zip -DestinationPath C:\c4d_build\sdk_extracted -Force

    - name: Merge Repo with SDK
      shell: powershell
      run: |
        $sdkRoot = Get-ChildItem -Path C:\c4d_build\sdk_extracted -Filter "frameworks" -Recurse | Select-Object -First 1 -ExpandProperty Parent
        
        # 1. Копируем ваш плагин в папку plugins
        $myPluginDir = Join-Path $sdkRoot.FullName "plugins\geometry_projection"
        New-Item -ItemType Directory -Path $myPluginDir -Force | Out-Null
        Copy-Item -Path "$env:GITHUB_WORKSPACE\source", "$env:GITHUB_WORKSPACE\res", "$env:GITHUB_WORKSPACE\project" -Destination $myPluginDir -Recurse -Force

        # 2. Накладываем ваши проекты фреймворков поверх SDK
        Copy-Item -Path "$env:GITHUB_WORKSPACE\frameworks" -Destination $sdkRoot.FullName -Recurse -Force

        # 3. ОЧИСТКА ASCII (Оставляем, так как это помогло Source Processor-у пройти)
        $files = Get-ChildItem -Path $myPluginDir -Include *.cpp,*.h,*.res,*.str -Recurse
        foreach ($file in $files) {
            $content = Get-Content $file.FullName
            $cleanContent = foreach ($line in $content) {
                [System.Text.RegularExpressions.Regex]::Replace($line, "[^\x00-\x7F]", "")
            }
            $cleanContent | Set-Content $file.FullName -Encoding Ascii
        }

        echo "SDK_ROOT=$($sdkRoot.FullName)" >> $env:GITHUB_ENV
        echo "PLUGIN_DIR=$myPluginDir" >> $env:GITHUB_ENV

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Build
      shell: powershell
      run: |
        $target = Get-ChildItem -Path $env:PLUGIN_DIR -Include "*.sln","*.vcxproj" -Recurse | Select-Object -First 1 -ExpandProperty FullName
        Write-Host "Building target: $target"

        # ПРИНУДИТЕЛЬНОЕ ПОДАВЛЕНИЕ ПРЕДУПРЕЖДЕНИЙ
        # Мы отключаем C5220 и еще пару типичных для R21 проблем через переменную CL.
        # Это сработает даже если в .vcxproj прописано "Warnings as Errors"
        $env:CL = "/wd5220 /wd5219 /wd4003 /wd4834"

        msbuild $target `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:PlatformToolset=v143 `
          /p:MAXON_ROOTDIR="$env:SDK_ROOT" `
          /p:TreatWarningsAsErrors=false `
          /p:BuildProjectReferences=false `
          /m

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: geometry_projection_win64
        path: |
          ${{ env.PLUGIN_DIR }}/**/*.xdl64
          ${{ env.PLUGIN_DIR }}/res/